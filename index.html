<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BIM Trainer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

:root {
  --dark:    #1a1a2e;
  --accent:  #4f6ef7;
  --green:   #22c55e;
  --orange:  #f97316;
  --red:     #ef4444;
  --bg:      #f1f5f9;
  --card:    #ffffff;
  --text:    #0f172a;
  --muted:   #64748b;
  --border:  #e2e8f0;
  --radius:  16px;
  --shadow:  0 4px 24px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: 'Inter', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 16px;
}

/* ── Layout wrapper ── */
.app {
  max-width: 480px;
  margin: 0 auto;
  padding: 0 0 40px 0;
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: var(--dark);
  color: white;
  padding: 20px 20px 18px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header h1 {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.header p {
  font-size: 12px;
  opacity: 0.6;
  margin-top: 2px;
}

/* ── Screens ── */
.screen { display: none; padding: 20px; }
.screen.active { display: block; }

/* ── Menu screen ── */
.menu-subtitle {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 16px;
  text-align: center;
}

.pruef-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 18px 20px;
  margin-bottom: 10px;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  text-align: left;
  box-shadow: var(--shadow);
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-appearance: none;
}
.pruef-btn:active { transform: scale(0.98); }
.pruef-btn .left  { display: flex; align-items: center; gap: 12px; }
.pruef-btn .emoji { font-size: 22px; }
.pruef-btn .label { font-size: 16px; font-weight: 700; }
.pruef-btn .sub   { font-size: 12px; color: var(--muted); font-weight: 400; margin-top: 2px; }
.pruef-btn .badge {
  font-size: 12px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 20px;
  background: var(--border);
  color: var(--muted);
}
.pruef-btn.done   { border-color: var(--green);  background: #f0fdf4; }
.pruef-btn.done .badge   { background: var(--green); color: white; }
.pruef-btn.active { border-color: var(--orange); background: #fff7ed; }
.pruef-btn.active .badge { background: var(--orange); color: white; }

.legend {
  display: flex;
  justify-content: center;
  gap: 16px;
  margin-top: 20px;
  flex-wrap: wrap;
}
.legend span {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}
.dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }

/* ── Quiz screen ── */
.quiz-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.tag {
  font-size: 11px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 20px;
  background: var(--dark);
  color: white;
  letter-spacing: 0.3px;
}
.group-tag {
  font-size: 11px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 20px;
  background: #eef2ff;
  color: var(--accent);
  max-width: 55%;
  text-align: right;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.progress-wrap {
  background: var(--border);
  border-radius: 8px;
  height: 6px;
  margin-bottom: 6px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 8px;
  transition: width 0.4s ease;
  width: 0%;
}
.progress-label {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 20px;
  text-align: right;
}

#question-text {
  font-size: 19px;
  font-weight: 700;
  line-height: 1.45;
  color: var(--text);
  margin-bottom: 22px;
  min-height: 60px;
}

.opt-btn {
  display: block;
  width: 100%;
  padding: 16px 18px;
  margin-bottom: 10px;
  font-size: 15px;
  font-weight: 500;
  text-align: left;
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  line-height: 1.45;
  color: var(--text);
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  transition: border-color 0.15s, background 0.15s;
  -webkit-appearance: none;
  min-height: 56px;
}
.opt-btn:active:not(:disabled) { transform: scale(0.99); }
.opt-btn.correct { background: #f0fdf4; border-color: var(--green);  color: #15803d; font-weight: 700; }
.opt-btn.wrong   { background: #fef2f2; border-color: var(--red);    color: #b91c1c; }
.opt-btn.missed  { background: #fff7ed; border-color: var(--orange);  color: #9a3412; font-weight: 700; }
.opt-btn.selected { background: #eef2ff; border-color: var(--accent); font-weight: 700; }
.opt-btn:disabled { cursor: default; }

.multi-hint {
  font-size: 12px;
  color: var(--accent);
  font-weight: 600;
  margin-bottom: 14px;
  padding: 6px 12px;
  background: #eef2ff;
  border-radius: 8px;
  display: inline-block;
}

#confirm-btn {
  display: none;
  width: 100%;
  padding: 16px;
  font-size: 16px;
  font-weight: 700;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  margin-bottom: 10px;
  -webkit-appearance: none;
}
#confirm-btn:active { opacity: 0.85; }

#feedback {
  font-size: 15px;
  font-weight: 700;
  min-height: 24px;
  margin: 4px 0 16px;
}
#feedback.ok  { color: var(--green); }
#feedback.err { color: var(--red); }

.next-btn {
  display: block;
  width: 100%;
  padding: 18px;
  font-size: 17px;
  font-weight: 700;
  background: var(--dark);
  color: white;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  margin-top: 4px;
  -webkit-appearance: none;
  letter-spacing: 0.2px;
}
.next-btn:active { opacity: 0.85; }

/* ── Result screen ── */
.result-card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 32px 24px;
  text-align: center;
  box-shadow: var(--shadow);
}
.result-emoji { font-size: 56px; margin-bottom: 12px; }
.result-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
.result-score { font-size: 42px; font-weight: 800; color: var(--accent); margin: 12px 0 4px; }
.result-pct   { font-size: 16px; color: var(--muted); margin-bottom: 20px; }
.result-sub   { font-size: 14px; color: var(--muted); margin-bottom: 28px; line-height: 1.6; }

.btn-retry {
  display: block;
  width: 100%;
  padding: 18px;
  font-size: 17px;
  font-weight: 700;
  background: var(--orange);
  color: white;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  margin-bottom: 10px;
  -webkit-appearance: none;
}
.btn-menu {
  display: block;
  width: 100%;
  padding: 18px;
  font-size: 17px;
  font-weight: 700;
  background: var(--dark);
  color: white;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  -webkit-appearance: none;
}
.btn-retry:active, .btn-menu:active { opacity: 0.85; }
</style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <h1>📐 BIM Lerntrainer</h1>
    <p id="header-sub">Wähle eine Prüfung zum Starten</p>
  </div>

  <!-- MENU -->
  <div id="screen-menu" class="screen active">
    <p class="menu-subtitle">6 Prüfungen · je 40 Fragen · alle Themen</p>
    <div id="menu-buttons"></div>
    <div class="legend">
      <span><span class="dot" style="background:#e2e8f0;border:1px solid #94a3b8"></span>Offen</span>
      <span><span class="dot" style="background:#f97316"></span>Laufend</span>
      <span><span class="dot" style="background:#22c55e"></span>Fertig</span>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-meta">
      <span class="tag" id="exam-tag"></span>
      <span class="group-tag" id="group-tag"></span>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="prog"></div>
    </div>
    <div class="progress-label" id="prog-label"></div>
    <div id="question-text"></div>
    <div id="options-wrap"></div>
    <div id="feedback"></div>
    <button id="confirm-btn" onclick="confirmMulti()">✅ Auswahl bestätigen</button>
    <button class="next-btn" onclick="nextQuestion()">Nächste Frage →</button>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="result-card">
      <div class="result-emoji" id="result-emoji"></div>
      <div class="result-title" id="result-title"></div>
      <div class="result-score" id="result-score"></div>
      <div class="result-pct"   id="result-pct"></div>
      <div class="result-sub"   id="result-sub"></div>
      <button class="btn-retry" id="btn-retry" onclick="retryWrong()" style="display:none">🔁 Fehler wiederholen</button>
      <button class="btn-menu"  onclick="showMenu()">🏠 Zurück zum Menü</button>
    </div>
    <div id="wrong-list-wrap" style="display:none;margin-top:20px;"></div>
  </div>

</div><!-- /app -->

<script>
var questions = [
{g:"BIM Grundlagen",q:"Was ist BIM?",a:"Digitale Methode zur Planung, Ausführung und Bewirtschaftung von Bauwerken mit einem gemeinsamen Datenmodell."},
{g:"BIM Grundlagen",q:"Was bedeutet Digitalisierung im Bauwesen?",a:"Einsatz digitaler Technologien zur effizienteren Planung, Koordination und Steuerung von Bauprojekten."},
{g:"BIM Grundlagen",q:"Was ist ein digitales Modell?",a:"Eine virtuelle Darstellung eines Bauwerks mit geometrischen und alphanumerischen Informationen."},
{g:"BIM Grundlagen",q:"Was bedeutet Dateninteroperabilität?",a:"Fähigkeit verschiedener Softwareprogramme, Daten miteinander auszutauschen und zu verstehen."},
{g:"BIM Grundlagen",q:"Was ist ein Datenstandard?",a:"Regelwerk zur einheitlichen Strukturierung und Nutzung von Daten."},
{g:"BIM Grundlagen",q:"Was bedeutet Open BIM?",a:"Nutzung offener Standards für den Datenaustausch zwischen verschiedenen Softwarelösungen."},
{g:"BIM Modell",q:"Was bedeutet LOD?",a:"Level of Development beschreibt den Entwicklungsgrad eines Bauteils im BIM-Modell."},
{g:"BIM Modell",q:"Was bedeutet LOI?",a:"Level of Information beschreibt den Informationsgehalt eines Bauteils."},
{g:"BIM Modell",q:"Was bedeutet LOG?",a:"Level of Geometry beschreibt den geometrischen Detailgrad eines Bauteils."},
{g:"BIM Modell",q:"Was bedeutet LOIN?",a:"Level of Information Need beschreibt den benötigten Informationsumfang für eine Aufgabe."},
{g:"BIM Modell",q:"Unterschied zwischen LOD und LOI?",a:"LOD beschreibt den Entwicklungsgrad der Geometrie, LOI beschreibt den Informationsgehalt eines Bauteils."},
{g:"BIM Modell",q:"Was bedeutet LOA?",a:"Level of Accuracy beschreibt die Genauigkeit der Modellinformationen."},
{g:"BIM Modell",q:"Was beschreibt der Informationsgehalt eines Bauteils im BIM-Modell?",a:"Eigenschaften wie Material, Kosten, Maße oder technische Daten."},
{g:"BIM Modell",q:"Warum ist eine einheitliche Datenstruktur im BIM-Projekt wichtig?",a:"Sie ermöglicht Datenaustausch, Auswertung und Zusammenarbeit zwischen Projektbeteiligten."},
{g:"BIM Modell",q:"Was ist ein digitales Bauwerksmodell?",a:"Eine digitale Darstellung eines Bauwerks mit geometrischen und alphanumerischen Informationen."},
{g:"BIM Modell",q:"Was sind alphanumerische Daten im BIM-Modell?",a:"Nicht-geometrische Informationen wie Materialien, Kosten oder technische Eigenschaften."},
{g:"BIM Modell",q:"Warum sind strukturierte Daten im BIM-Modell wichtig?",a:"Sie ermöglichen automatisierte Auswertungen, Analysen und Simulationen."},
{g:"BIM Modell",q:"Was ermöglicht die automatische Mengenermittlung im BIM-Modell?",a:"Bauteile mit definierten Eigenschaften und geometrischen Informationen."},
{g:"KI im Bauwesen",q:"Was bedeutet KI-gestützte Systeme im Bauwesen?",a:"Einsatz von künstlicher Intelligenz zur Analyse, Planung und Optimierung von Bauprozessen."},
{g:"KI im Bauwesen",q:"Beispiel für KI-Anwendung im Bauwesen?",a:"Automatische Analyse des Baufortschritts oder Baustellenüberwachung."},
{g:"KI im Bauwesen",q:"Vorteil von KI im Bauprojekt?",a:"Schnellere Datenanalyse und bessere Entscheidungsunterstützung."},
{g:"BIM Anwendung",q:"Welche Vorteile bietet ein CDE?",a:"Zentrale Datenverwaltung, bessere Zusammenarbeit und transparente Informationsverteilung."},
{g:"BIM Anwendung",q:"Welche Daten können im CDE gespeichert werden?",a:"Modelle, Pläne, Dokumente, Berichte und Kommunikationsinformationen."},
{g:"BIM Anwendung",q:"Welche Rolle spielt BIM in der Kostenplanung?",a:"BIM ermöglicht automatische Mengenermittlung und modellbasierte Kostenberechnung."},
{g:"BIM Anwendung",q:"Was sind BIM-Anwendungsfälle?",a:"Konkrete Anwendungen von BIM wie 3D-Modellierung, Terminplanung (4D), Kostenplanung (5D) oder Kollisionsprüfung."},
{g:"BIM Anwendung",q:"Was bedeutet Building OTS?",a:"Offene Technologieplattform zur Integration verschiedener digitaler Systeme im Bauwesen."},
{g:"BIM Anwendung",q:"Was ist AVA im Bauwesen?",a:"Software zur Ausschreibung, Vergabe und Abrechnung von Bauleistungen."},
{g:"BIM Anwendung",q:"Was ist BCF-Management (BCFM)?",a:"System zur Verwaltung und Nachverfolgung von BIM-Koordinationsaufgaben."},
{g:"BIM Anwendung",q:"Was ist eine Information Delivery Specification (IDS)?",a:"Standard zur Definition und automatischen Prüfung von Informationsanforderungen an BIM-Modelle."},
{g:"BIM Anwendung",q:"Was ist ein Project Information Model (PIM)?",a:"Informationsmodell eines Bauprojekts während Planung und Bauphase."},
{g:"BIM Anwendung",q:"Was ist ein Asset Information Model (AIM)?",a:"Informationsmodell eines Bauwerks für Betrieb und Facility Management."},
{g:"BIM Austausch",q:"Was ist IFC?",a:"Offenes Austauschformat für BIM-Modelldaten zwischen verschiedenen Softwareprogrammen."},
{g:"BIM Austausch",q:"Was ist BCF?",a:"Format zur Kommunikation von Problemen, Kommentaren und Aufgaben im BIM-Modell."},
{g:"BIM Austausch",q:"Zusammenhang IFC und BCF?",a:"IFC überträgt Modelldaten, BCF überträgt Kommunikationsinformationen zu Modellproblemen."},
{g:"BIM Austausch",q:"Wie ergänzen sich IFC und BCF?",a:"IFC überträgt das Modell, BCF überträgt Kommentare und Koordinationsinformationen zum Modell."},
{g:"BIM Dimensionen",q:"Was bedeutet 3D BIM?",a:"Dreidimensionale Modellierung eines Bauwerks."},
{g:"BIM Dimensionen",q:"Was bedeutet 4D BIM?",a:"Verknüpfung des 3D-Modells mit Terminplanung."},
{g:"BIM Dimensionen",q:"Was bedeutet 5D BIM?",a:"Verknüpfung des BIM-Modells mit Kosteninformationen."},
{g:"BIM Prozesse",q:"Was ist ein CDE?",a:"Common Data Environment – zentrale Plattform zur Verwaltung und zum Austausch von Projektdaten."},
{g:"BIM Prozesse",q:"Was ist AIA?",a:"Auftraggeber-Informationsanforderungen des Bauherrn."},
{g:"BIM Prozesse",q:"Was ist BAP?",a:"BIM-Abwicklungsplan zur Organisation der BIM-Prozesse."},
{g:"BIM Prozesse",q:"Wie hängen AIA und BAP zusammen?",a:"AIA definieren die Anforderungen des Auftraggebers, der BAP beschreibt die Umsetzung dieser Anforderungen."},
{g:"BIM Prozesse",q:"Welche drei Kernkomponenten hat ein CDE?",a:"Dokumentenmanagementsystem, Model Viewer und Kollaborationstool."},
{g:"BIM Prozesse",q:"Was ist ein BIM-Review?",a:"Systematische Prüfung eines BIM-Modells zur Kontrolle von Struktur, Klassifikation und Datenqualität."},
{g:"BIM Prozesse",q:"Was bedeutet informationstechnische Prüfung im BIM-Prozess?",a:"Überprüfung der Datenstruktur, Klassifizierung und Modellinformationen."},
{g:"BIM Prozesse",q:"Warum ist korrekte Klassifizierung von Bauteilen wichtig?",a:"Falsche Klassifizierung führt zu fehlerhaften Auswertungen wie Mengenermittlung oder Terminplanung."},
{g:"BIM Prozesse",q:"Was bedeutet Informationsmanagement im BIM-Projekt?",a:"Strukturierte Organisation, Verwaltung und Austausch von Projektinformationen über den gesamten Lebenszyklus eines Bauwerks."},
{g:"BIM Prozesse",q:"Warum ist Informationsmanagement im BIM-Prozess entscheidend?",a:"Es stellt sicher, dass alle Beteiligten mit aktuellen und konsistenten Informationen arbeiten."},
{g:"BIM Prozesse",q:"Welche Rolle spielt der Informationsfluss im BIM-Projekt?",a:"Er ermöglicht koordinierte Planung, Kommunikation und Entscheidungsprozesse."},
{g:"BIM Prozesse",q:"Warum müssen Informationen im BIM-Projekt standardisiert werden?",a:"Damit Daten zwischen verschiedenen Softwarelösungen und Projektbeteiligten austauschbar sind."},
{g:"BIM Prozesse",q:"Welche Aufgabe hat ein CDE im BIM-Projekt?",a:"Zentrale Verwaltung und Austausch aller Projektinformationen."},
{g:"BIM Prozesse",q:"Warum verbessert ein CDE die Zusammenarbeit?",a:"Alle Beteiligten arbeiten mit denselben aktuellen Informationen."},
{g:"BIM Prozesse",q:"Was sind Autorensoftware im BIM-Prozess?",a:"Software zur Erstellung von BIM-Modellen wie Revit oder Archicad."},
{g:"BIM Prozesse",q:"Was bedeutet Kollaborationsprozess im BIM?",a:"Zusammenarbeit verschiedener Projektbeteiligter über gemeinsame Datenmodelle und Plattformen."},
{g:"BIM Prozesse",q:"Warum ist korrekte Benennung von Bauteilen im BIM-Modell wichtig?",a:"Nur korrekt benannte Bauteile können von digitalen Anwendungen automatisch ausgewertet werden."},
{g:"Normen",q:"Was regelt DIN 19650?",a:"Informationsmanagement mit BIM über den gesamten Lebenszyklus eines Bauwerks."},
{g:"Normen",q:"Was regelt ÖNORM A 6245?",a:"Anwendung von BIM im österreichischen Bauwesen."},
{g:"Normen",q:"Was regelt ÖNORM B 1801?",a:"Kostenplanung und Kostenmanagement im Bauwesen."},
{g:"Normen",q:"Warum ist DIN 19650 wichtig?",a:"Die Norm standardisiert das Informationsmanagement in BIM-Projekten."},
{g:"Normen",q:"Warum unterscheidet DIN 19650 zwischen PIM und AIM?",a:"Sie trennt Projektinformationen von Betriebsinformationen, um eine strukturierte Datenübergabe zu ermöglichen."},
{g:"Normen",q:"Warum sind Standards im BIM-Prozess wichtig?",a:"Sie ermöglichen einheitliche Arbeitsweisen und den Datenaustausch zwischen verschiedenen Systemen."},
{g:"Normen",q:"Welche Organisation entwickelt viele BIM-Standards?",a:"buildingSMART."},
{g:"Normen",q:"Welche Rolle spielt buildingSMART im BIM-Kontext?",a:"Entwicklung offener BIM-Standards wie IFC und BCF."},
{g:"Vertragsmodelle",q:"Was ist Einzelvergabe?",a:"Der Bauherr vergibt einzelne Gewerke direkt an verschiedene Auftragnehmer."},
{g:"Vertragsmodelle",q:"Was ist ein Einzelvertrag?",a:"Ein Vertrag zwischen Bauherr und Auftragnehmer für ein spezifisches Gewerk."},
{g:"Vertragsmodelle",q:"Was ist ein Globalvertrag?",a:"Ein Vertrag, der mehrere Leistungen oder Gewerke in einem Gesamtvertrag bündelt."},
{g:"Vertragsmodelle",q:"Unterschied zwischen GU und GÜ?",a:"Beim GU bleibt die Planung beim Bauherrn oder Planer, beim GÜ übernimmt der Auftragnehmer auch Planungsleistungen."},
{g:"Vertragsmodelle",q:"Unterschied zwischen TU und GU?",a:"Beim TU übernimmt ein Unternehmen Planung und Bau vollständig, beim GU meist nur die Bauausführung."},
{g:"Vertragsmodelle",q:"Unterschied zwischen TU und GÜ?",a:"Der TU übernimmt Planung und Bau selbst, der GÜ organisiert Planung und Bau über Subunternehmer."},
{g:"Vertragsmodelle",q:"Vorteil eines TU-Modells?",a:"Ein zentraler Ansprechpartner und klare Verantwortlichkeiten."},
{g:"Vertragsmodelle",q:"Nachteil eines TU-Modells?",a:"Weniger Einfluss des Bauherrn auf Planung und Ausführung."},
{g:"Vertragsmodelle",q:"Vorteil der Einzelvergabe?",a:"Mehr Kontrolle des Bauherrn über einzelne Gewerke."},
{g:"Vertragsmodelle",q:"Nachteil der Einzelvergabe?",a:"Hoher Koordinationsaufwand für den Bauherrn."},
{g:"Projektorganisation",q:"Wer ist der Auftraggeber (AG)?",a:"Der Bauherr und wirtschaftlich Verantwortliche des Projekts."},
{g:"Projektorganisation",q:"Was ist ein Auftragnehmer (AN)?",a:"Unternehmen oder Organisation, die Leistungen für den Auftraggeber erbringt."},
{g:"Projektorganisation",q:"Was ist ein Generalunternehmer (GU)?",a:"Unternehmen, das die Bauausführung organisiert und Nachunternehmer koordiniert."},
{g:"Projektorganisation",q:"Was ist ein Generalübernehmer (GÜ)?",a:"Unternehmen, das Planung und Bau koordiniert, aber keine Leistungen selbst ausführt."},

var EXAM_SIZE = 40, NUM_EXAMS = 6;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length-1; i > 0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function buildExams() {
  var pool = shuffle(questions), exams = [];
  for (var i = 0; i < NUM_EXAMS; i++) {
    var s = pool.slice(i*EXAM_SIZE, (i+1)*EXAM_SIZE), k = 0;
    while (s.length < EXAM_SIZE) { s.push(pool[k++ % pool.length]); }
    exams.push(s);
  }
  return exams;
}

function getOptions(cur) {
  // Multi-answer questions have their own options array
  if (cur.multi && cur.o) return shuffle(cur.o.slice());
  // Single-answer with predefined wrong options
  if (cur.o && cur.o.length >= 3) return shuffle([cur.a, cur.o[0], cur.o[1], cur.o[2]]);
  // Default: pick 3 wrong from same group
  var pool = questions.filter(function(q){ return q.g===cur.g && q.a!==cur.a; });
  if (pool.length < 3) pool = questions.filter(function(q){ return q.a!==cur.a; });
  var w = shuffle(pool).slice(0,3).map(function(q){ return q.a; });
  return shuffle([cur.a].concat(w));
}

var selectedOptions = []; // tracks selections for multi-answer questions

function showQ() {
  if (qIdx >= queue.length) { showResult(); return; }
  answered = false;
  selectedOptions = [];
  cur = queue[qIdx];
  var pct = Math.round(qIdx/queue.length*100);
  document.getElementById('prog').style.width = pct+'%';
  document.getElementById('prog-label').textContent = (retry?'🔁 Wiederholung':'Frage '+(qIdx+1)+' / '+queue.length) + '  ·  '+correct+' richtig';
  document.getElementById('group-tag').textContent = cur.g;
  document.getElementById('question-text').textContent = cur.q;

  var wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';

  // Show multi-hint if multi question
  if (cur.multi) {
    var hint = document.createElement('div');
    hint.className = 'multi-hint';
    hint.textContent = '☝️ Mehrere Antworten möglich – alle richtigen auswählen';
    wrap.appendChild(hint);
  }

  var opts = getOptions(cur);
  for (var i=0; i<opts.length; i++) {
    var b = document.createElement('button');
    b.className = 'opt-btn';
    b.textContent = opts[i];
    if (cur.multi) {
      (function(btn, opt){ btn.onclick = function(){ toggleMulti(btn, opt); }; })(b, opts[i]);
    } else {
      (function(btn, opt){ btn.onclick = function(){ checkAns(btn, opt); }; })(b, opts[i]);
    }
    wrap.appendChild(b);
  }

  var fb = document.getElementById('feedback');
  fb.textContent = ''; fb.className = '';

  // Show/hide confirm button
  document.getElementById('confirm-btn').style.display = cur.multi ? 'block' : 'none';
}

function toggleMulti(btn, opt) {
  if (answered) return;
  var idx = selectedOptions.indexOf(opt);
  if (idx === -1) {
    selectedOptions.push(opt);
    btn.classList.add('selected');
  } else {
    selectedOptions.splice(idx, 1);
    btn.classList.remove('selected');
  }
}

function confirmMulti() {
  if (answered) return;
  if (selectedOptions.length === 0) {
    document.getElementById('feedback').textContent = '⚠️ Bitte mindestens eine Antwort auswählen.';
    document.getElementById('feedback').className = 'err';
    return;
  }
  answered = true;
  total++;

  var btns = document.getElementById('options-wrap').getElementsByTagName('button');
  for (var i=0; i<btns.length; i++) btns[i].onclick = null;

  // Check if selected exactly matches correct answers
  var ca = cur.ca;
  var allCorrect = ca.length === selectedOptions.length &&
    ca.every(function(c){ return selectedOptions.indexOf(c) !== -1; });

  // Color all buttons
  for (var i=0; i<btns.length; i++) {
    var t = btns[i].textContent;
    var isCorrect = ca.indexOf(t) !== -1;
    var isSelected = selectedOptions.indexOf(t) !== -1;
    if (isCorrect && isSelected)  { btns[i].className = 'opt-btn correct'; }   // right, selected ✅
    else if (!isCorrect && isSelected) { btns[i].className = 'opt-btn wrong'; } // wrong, selected ❌
    else if (isCorrect && !isSelected) { btns[i].className = 'opt-btn missed'; } // missed correct ⚠️
    else { btns[i].className = 'opt-btn'; btns[i].disabled = true; }
  }

  var fb = document.getElementById('feedback');
  var merksatz = cur.m ? '<br><span style="font-weight:400;font-size:13px;opacity:0.85">'+cur.m+'</span>' : '';
  if (allCorrect) {
    fb.innerHTML = '✅ Richtig! Alle korrekten Antworten gewählt.' + merksatz;
    fb.className = 'ok';
    correct++;
  } else {
    fb.innerHTML = '❌ Nicht vollständig. <span style="font-weight:400">🟠 = vergessene richtige Antworten</span>' + merksatz;
    fb.className = 'err';
    wrongs.push(cur);
    if (!retry) allWrongs.push(cur);
  }

  document.getElementById('confirm-btn').style.display = 'none';
  document.getElementById('prog-label').textContent =
    (retry?'🔁 Wiederholung':'Frage '+(qIdx+1)+' / '+queue.length)+'  ·  '+correct+' richtig';
  qIdx++;
}

function checkAns(btn, ans) {
  if (answered) return;
  answered = true; total++;
  var btns = document.getElementById('options-wrap').getElementsByTagName('button');
  for (var i=0;i<btns.length;i++) btns[i].onclick=null;
  var fb = document.getElementById('feedback');
  var merksatz = cur.m ? '<br><span style="font-weight:400;font-size:13px;opacity:0.85">'+cur.m+'</span>' : '';
  if (ans === cur.a) {
    btn.className='opt-btn correct';
    fb.innerHTML='✅ Richtig!'+merksatz; fb.className='ok'; correct++;
  } else {
    btn.className='opt-btn wrong';
    for (var i=0;i<btns.length;i++) if (btns[i].textContent===cur.a) btns[i].className='opt-btn correct';
    fb.innerHTML='❌ Falsch  ·  Richtig: <b>'+cur.a+'</b>'+merksatz; fb.className='err';
    wrongs.push(cur);
    if (!retry) allWrongs.push(cur);
  }
  document.getElementById('prog-label').textContent = (retry?'🔁 Wiederholung':'Frage '+(qIdx+1)+' / '+queue.length)+'  ·  '+correct+' richtig';
  qIdx++;
}

function nextQuestion() {
  if (!answered && qIdx < queue.length) return;
  showQ();
}

var exams      = buildExams();
var examStatus = ["pending","pending","pending","pending","pending","pending"];
var examScores = [null,null,null,null,null,null];
var curExam=-1, queue=[], wrongs=[], allWrongs=[], qIdx=0, correct=0, total=0, retry=false, cur=null, answered=false;
var mainCorrect=0, mainTotal=0; // always stores the original 40-question score

function showScreen(id) {
  ['screen-menu','screen-quiz','screen-result'].forEach(function(s){
    var el = document.getElementById(s);
    el.classList.remove('active');
  });
  document.getElementById(id).classList.add('active');
}

function showMenu() {
  document.getElementById('header-sub').textContent = 'Wähle eine Prüfung zum Starten';
  showScreen('screen-menu');
  var wrap = document.getElementById('menu-buttons');
  wrap.innerHTML = '';
  for (var i = 0; i < NUM_EXAMS; i++) {
    var btn = document.createElement('button');
    btn.className = 'pruef-btn' + (examStatus[i]==='done'?' done':(examStatus[i]==='active'?' active':''));
    var emoji = examStatus[i]==='done'?'✅':(examStatus[i]==='active'?'▶️':'📝');
    var scoreStr = examScores[i] ? examScores[i].c+'/'+examScores[i].t : '40 Fragen';
    btn.innerHTML = '<div class="left"><span class="emoji">'+emoji+'</span><div><div class="label">Prüfung '+(i+1)+'</div><div class="sub">'+scoreStr+'</div></div></div><span class="badge">'+(examStatus[i]==='done'?'Fertig':(examStatus[i]==='active'?'Weiter':'Start'))+'</span>';
    (function(idx){ btn.onclick = function(){ startExam(idx); }; })(i);
    wrap.appendChild(btn);
  }
}

function startExam(idx) {
  curExam = idx; examStatus[idx]='active';
  queue = shuffle(exams[idx].slice());
  wrongs=[]; allWrongs=[]; qIdx=correct=total=0; retry=false;
  mainCorrect=0; mainTotal=0;
  document.getElementById('exam-tag').textContent = 'Prüfung '+(idx+1)+' / '+NUM_EXAMS;
  document.getElementById('header-sub').textContent = 'Prüfung '+(idx+1);
  showScreen('screen-quiz');
  showQ();
}

function showResult() {
  showScreen('screen-result');

  // Save original exam score only on first completion (not retry)
  if (!retry) {
    mainCorrect = correct;
    mainTotal   = total;
    examScores[curExam] = {c: mainCorrect, t: mainTotal};
    examStatus[curExam] = 'done';
  }

  var pct = Math.round(mainCorrect / mainTotal * 100);
  document.getElementById('result-emoji').textContent = pct>=75?'🎉':(pct>=50?'👍':'📚');
  document.getElementById('result-title').textContent = 'Prüfung '+(curExam+1)+' abgeschlossen';
  document.getElementById('result-score').textContent = mainCorrect+' / '+mainTotal;
  document.getElementById('result-pct').textContent   = pct+'% richtig';

  var wc = wrongs.length;
  document.getElementById('result-sub').textContent = wc>0
    ? wc+' Fragen falsch beantwortet – du kannst sie jetzt wiederholen.'
    : 'Keine Fehler – perfekt! 🏆';
  document.getElementById('btn-retry').style.display = wc>0 ? 'block' : 'none';

  // Show list of ALL wrong answers from the original exam
  var wrap = document.getElementById('wrong-list-wrap');
  if (allWrongs.length > 0) {
    wrap.style.display = 'block';
    var html = '<div style="font-size:14px;font-weight:700;color:#0f172a;margin-bottom:12px;">❌ Falsch beantwortete Fragen ('+allWrongs.length+')</div>';
    for (var i=0; i<allWrongs.length; i++) {
      var w = allWrongs[i];
      html += '<div style="background:white;border-radius:12px;padding:14px 16px;margin-bottom:10px;border-left:4px solid #ef4444;box-shadow:0 1px 4px rgba(0,0,0,0.06);">'
        + '<div style="font-size:13px;font-weight:700;color:#64748b;margin-bottom:4px;">'+w.g+'</div>'
        + '<div style="font-size:14px;font-weight:600;color:#0f172a;margin-bottom:6px;">'+w.q+'</div>'
        + '<div style="font-size:13px;color:#15803d;background:#f0fdf4;border-radius:8px;padding:8px 10px;">✅ '+w.a+'</div>'
        + (w.m ? '<div style="font-size:12px;color:#64748b;margin-top:6px;">'+w.m+'</div>' : '')
        + '</div>';
    }
    wrap.innerHTML = html;
  } else {
    wrap.style.display = 'none';
    wrap.innerHTML = '';
  }
}

function retryWrong() {
  // Use current wrongs for this retry round; allWrongs stays intact for the list
  queue = shuffle(wrongs.slice());
  wrongs = [];
  qIdx = correct = total = 0;
  retry = true;
  document.getElementById('exam-tag').textContent = '🔁 Wiederholung '+(curExam+1);
  document.getElementById('header-sub').textContent = 'Fehler wiederholen';
  showScreen('screen-quiz');
  showQ();
}

window.onload = function(){ showMenu(); };
