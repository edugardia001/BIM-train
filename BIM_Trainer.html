<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BIM Trainer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 16px;
}

h1 {
  font-size: 1.6rem;
  color: #1a1a2e;
  margin-bottom: 24px;
  letter-spacing: 1px;
}

#exam-selector {
  background: white;
  border-radius: 14px;
  padding: 32px 28px;
  max-width: 520px;
  width: 100%;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  text-align: center;
}
#exam-selector h2 { color: #1a1a2e; margin-bottom: 8px; font-size: 1.2rem; }
#exam-selector p  { color: #666; font-size: 0.9rem; margin-bottom: 24px; }

.exam-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 20px;
}

.exam-btn {
  background: #1a1a2e;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 18px 8px;
  font-size: 0.95rem;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  line-height: 1.6;
}
.exam-btn:hover  { background: #2d2d5e; transform: translateY(-2px); }
.exam-btn.done   { background: #27ae60; }
.exam-btn.active { background: #e67e22; }

.legend {
  display: flex;
  justify-content: center;
  gap: 20px;
  font-size: 0.8rem;
  color: #888;
  flex-wrap: wrap;
}
.legend span { display: flex; align-items: center; gap: 6px; }
.dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }

#quiz-card {
  display: none;
  background: white;
  border-radius: 14px;
  padding: 30px 28px;
  max-width: 700px;
  width: 100%;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 8px;
}
.exam-label {
  background: #1a1a2e;
  color: white;
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 0.82rem;
}
.group-label {
  background: #eef2ff;
  color: #3a3a8e;
  border-radius: 20px;
  padding: 4px 14px;
  font-size: 0.82rem;
  font-weight: bold;
}

.progress-bar-wrap {
  background: #eee;
  border-radius: 8px;
  height: 8px;
  margin-bottom: 22px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: #1a1a2e;
  border-radius: 8px;
  transition: width 0.4s ease;
}

#question {
  font-size: 1.15rem;
  font-weight: bold;
  color: #1a1a2e;
  margin-bottom: 22px;
  line-height: 1.5;
  min-height: 56px;
}

.option-btn {
  display: block;
  width: 100%;
  margin-bottom: 10px;
  padding: 13px 16px;
  font-size: 0.95rem;
  text-align: left;
  background: #f7f8fc;
  border: 2px solid #e0e4f0;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  line-height: 1.4;
}
.option-btn:hover:not(:disabled) {
  background: #eef2ff;
  border-color: #a0aae0;
}
.option-btn.correct { background: #d4f7d4; border-color: #4caf50; }
.option-btn.wrong   { background: #fdd;    border-color: #e53935; }
.option-btn:disabled { cursor: default; }

#feedback {
  margin-top: 14px;
  font-size: 1rem;
  min-height: 28px;
  font-weight: bold;
}
#feedback.ok  { color: #27ae60; }
#feedback.err { color: #e53935; }

.quiz-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 20px;
  flex-wrap: wrap;
  gap: 10px;
}
#score-display { font-size: 0.9rem; color: #555; }

#next-btn {
  background: #1a1a2e;
  color: white;
  border: none;
  border-radius: 10px;
  padding: 11px 28px;
  font-size: 0.95rem;
  cursor: pointer;
  transition: background 0.2s;
}
#next-btn:hover { background: #2d2d5e; }

#result-screen {
  display: none;
  background: white;
  border-radius: 14px;
  padding: 36px 28px;
  max-width: 520px;
  width: 100%;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  text-align: center;
}
#result-screen h2 { font-size: 1.4rem; color: #1a1a2e; margin-bottom: 12px; }
#result-details   { color: #555; font-size: 0.95rem; margin-bottom: 24px; line-height: 1.8; }

.result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.result-btns button {
  border: none;
  border-radius: 10px;
  padding: 12px 24px;
  font-size: 0.95rem;
  cursor: pointer;
}
.result-btns button:hover { opacity: 0.85; }
#btn-retry { background: #e67e22; color: white; }
#btn-menu  { background: #1a1a2e; color: white; }
</style>
</head>
<body>

<h1>📐 BIM Lerntrainer</h1>

<div id="exam-selector">
  <h2>Wähle eine Prüfung</h2>
  <p>6 Prüfungen · je 40 Fragen · alle Themen abgedeckt</p>
  <div class="exam-grid" id="exam-grid"></div>
  <div class="legend">
    <span><span class="dot" style="background:#1a1a2e"></span>Nicht begonnen</span>
    <span><span class="dot" style="background:#e67e22"></span>Laufend</span>
    <span><span class="dot" style="background:#27ae60"></span>Abgeschlossen</span>
  </div>
</div>

<div id="quiz-card">
  <div class="quiz-header">
    <span class="exam-label" id="exam-label"></span>
    <span class="group-label" id="group-label"></span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-bar"></div>
  </div>
  <div id="question"></div>
  <div id="options"></div>
  <div id="feedback"></div>
  <div class="quiz-footer">
    <span id="score-display"></span>
    <button id="next-btn" onclick="nextQuestion()">Nächste Frage →</button>
  </div>
</div>

<div id="result-screen">
  <h2 id="result-title"></h2>
  <div id="result-details"></div>
  <div class="result-btns">
    <button id="btn-retry" onclick="retryWrong()">🔁 Fehler wiederholen</button>
    <button id="btn-menu"  onclick="showMenu()">🏠 Menü</button>
  </div>
</div>

// ── Helpers ──────────────────────────────────────────────────────────────────
const EXAM_SIZE = 40;
const NUM_EXAMS = 6;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Build 6 non-overlapping exams of 40 questions each
function buildExams() {
  const pool = shuffle([...questions]);
  const exams = [];
  for (let i = 0; i < NUM_EXAMS; i++) {
    const start = i * EXAM_SIZE;
    const slice = pool.slice(start, start + EXAM_SIZE);
    // if last exam is short, pad with earlier questions
    while (slice.length < EXAM_SIZE) slice.push(pool[slice.length % pool.length]);
    exams.push(slice);
  }
  return exams;
}

// 4 options: 1 correct + 3 wrong from the SAME group when possible
function getOptions(current) {
  let pool = questions.filter(q => q.g === current.g && q.a !== current.a);
  if (pool.length < 3) pool = questions.filter(q => q.a !== current.a);
  const wrongs = shuffle(pool).slice(0, 3).map(q => q.a);
  return shuffle([current.a, ...wrongs]);
}

// ── State ────────────────────────────────────────────────────────────────────
let exams       = buildExams();
let examStatus  = Array(NUM_EXAMS).fill('pending');
let examScores  = Array(NUM_EXAMS).fill(null);

let currentExamIdx = -1;
let sessionQueue   = [];
let wrongList      = [];
let qIdx           = 0;
let correct        = 0;
let total          = 0;
let isRetryMode    = false;
let current        = null;
let answered       = false;

// ── Menu ─────────────────────────────────────────────────────────────────────
function showMenu() {
  document.getElementById('exam-selector').style.display = 'block';
  document.getElementById('quiz-card').style.display     = 'none';
  document.getElementById('result-screen').style.display = 'none';
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('exam-grid');
  grid.innerHTML = '';
  for (let i = 0; i < NUM_EXAMS; i++) {
    const btn   = document.createElement('button');
    btn.className = 'exam-btn';
    const emoji = examStatus[i] === 'done' ? '✅' : examStatus[i] === 'active' ? '▶️' : '📝';
    const score = examScores[i] ? `<br><small>${examScores[i].c}/${examScores[i].t}</small>` : '';
    btn.innerHTML = `${emoji}<br>Prüfung ${i + 1}${score}`;
    if (examStatus[i] === 'done')   btn.classList.add('done');
    if (examStatus[i] === 'active') btn.classList.add('active');
    btn.onclick = () => startExam(i);
    grid.appendChild(btn);
  }
}

// ── Start exam ───────────────────────────────────────────────────────────────
function startExam(idx) {
  currentExamIdx = idx;
  examStatus[idx] = 'active';
  sessionQueue   = shuffle([...exams[idx]]);
  wrongList      = [];
  qIdx = correct = total = 0;
  isRetryMode    = false;

  document.getElementById('exam-selector').style.display = 'none';
  document.getElementById('quiz-card').style.display     = 'block';
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('exam-label').textContent      = `Prüfung ${idx + 1} / ${NUM_EXAMS}`;
  showQuestion();
}

// ── Question display ─────────────────────────────────────────────────────────
function showQuestion() {
  if (qIdx >= sessionQueue.length) { showResult(); return; }

  answered = false;
  current  = sessionQueue[qIdx];

  document.getElementById('progress-bar').style.width =
    Math.round((qIdx / sessionQueue.length) * 100) + '%';
  document.getElementById('group-label').textContent = current.g;
  document.getElementById('question').textContent    = current.q;

  const container = document.getElementById('options');
  container.innerHTML = '';
  getOptions(current).forEach(opt => {
    const b = document.createElement('button');
    b.className   = 'option-btn';
    b.textContent = opt;
    b.onclick = () => checkAnswer(b, opt);
    container.appendChild(b);
  });

  const fb = document.getElementById('feedback');
  fb.textContent = '';
  fb.className   = '';

  document.getElementById('score-display').textContent =
    `${isRetryMode ? '🔁 Wiederholung' : 'Frage ' + (qIdx + 1) + ' / ' + sessionQueue.length}  |  Score: ${correct} / ${total}`;
}

function checkAnswer(button, answer) {
  if (answered) return;
  answered = true;
  total++;

  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

  const fb = document.getElementById('feedback');
  if (answer === current.a) {
    button.classList.add('correct');
    fb.textContent = '✅ Richtig!';
    fb.className   = 'ok';
    correct++;
  } else {
    button.classList.add('wrong');
    document.querySelectorAll('.option-btn').forEach(b => {
      if (b.textContent === current.a) b.classList.add('correct');
    });
    fb.innerHTML = `❌ Falsch &nbsp;·&nbsp; Richtig: <b>${current.a}</b>`;
    fb.className = 'err';
    wrongList.push(current);
  }

  document.getElementById('score-display').textContent =
    `Frage ${qIdx + 1} / ${sessionQueue.length}  |  Score: ${correct} / ${total}`;
  qIdx++;
}

function nextQuestion() {
  if (!answered && qIdx < sessionQueue.length) return;
  showQuestion();
}

// ── Result ───────────────────────────────────────────────────────────────────
function showResult() {
  document.getElementById('quiz-card').style.display     = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const pct   = Math.round((correct / total) * 100);
  const emoji = pct >= 75 ? '🎉' : pct >= 50 ? '👍' : '📚';

  examScores[currentExamIdx] = { c: correct, t: total };
  if (!isRetryMode) examStatus[currentExamIdx] = 'done';

  document.getElementById('result-title').textContent =
    `${emoji} Prüfung ${currentExamIdx + 1} abgeschlossen`;

  const wc = wrongList.length;
  document.getElementById('result-details').innerHTML =
    `Ergebnis: <b>${correct} / ${total}</b> (${pct}%)<br>` +
    (wc > 0 ? `Falsch: <b>${wc}</b> Fragen – du kannst sie jetzt wiederholen.`
            : `Keine Fehler – perfekt! 🏆`);

  document.getElementById('btn-retry').style.display = wc > 0 ? 'inline-block' : 'none';
}

function retryWrong() {
  sessionQueue = shuffle([...wrongList]);
  wrongList    = [];
  qIdx = correct = total = 0;
  isRetryMode  = true;

  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('quiz-card').style.display     = 'block';
  document.getElementById('exam-label').textContent      = `🔁 Wiederholung – Prüfung ${currentExamIdx + 1}`;
  showQuestion();
}

// ── Init ─────────────────────────────────────────────────────────────────────
showMenu();
</script>
